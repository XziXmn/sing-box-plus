name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: get version
        id: version
        run: |
          version=$(grep -E '^is_sh_ver=' sing-box.sh | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: build relay parser
        run: |
          mkdir -p bin
          cd cmd/relay-parser
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../../bin/relay-parser-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../../bin/relay-parser-linux-arm64 .

      - name: package
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./docs' \
            -czf "$RUNNER_TEMP/code.tar.gz" .

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: sing-box-plus ${{ steps.version.outputs.version }}
          files: |
            ${{ runner.temp }}/code.tar.gz
            bin/relay-parser-linux-amd64
            bin/relay-parser-linux-arm64
          overwrite_files: true
          make_latest: true
